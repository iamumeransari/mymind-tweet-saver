<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="320" height="176" viewBox="0 0 320 176">
  <defs>
    <rect id="panel-bg" x="0.5" y="0.5" width="319" height="175" rx="12" ry="12"/>
    <clipPath id="panel-clip"><use xlink:href="#panel-bg"/></clipPath>
  </defs>

  <!-- Panel background + border -->
  <use xlink:href="#panel-bg" fill="#16181C" stroke="#2F3336" stroke-width="1"/>

  <!-- === HEADER === -->
  <!-- Logo at (20, 22), 24px tall -->
  <g transform="translate(20, 22)">
    <g transform="scale(0.6316)">
      <path d="m13.1135979 1.54495422c-.2591574-.03664732-.5187049-.04495422-1.1419979-.04495422-.9503477 0-1.9036568.14934901-2.8351787.44088761-3.10272858 1.04273171-5.51426505 3.7677939-6.77685087 7.73477463-1.2374245 3.95026026-1.13745468 8.65465026.28840086 13.22541246 2.34062016 7.345208 7.72106031 12.7143038 13.22824111 13.3844416.3032801.0376329.5734354.0462837 1.1521876.0462837.9503675 0 1.9037092-.1493441 2.8351562-.4408528 3.1605014-1.0621537 5.5838002-3.7721399 6.7768369-7.7348603 1.2374544-3.9501538 1.1374774-8.6545278-.2883849-13.2253632-2.3317763-7.31748399-7.7009576-12.66011017-13.2384103-13.38576948zm.1949021-1.48728382c6.1611.8073856 11.9734 6.5744296 14.4727 14.4176296 1.5112 4.8443 1.6275 9.8616.2906 14.1292-1.3368 4.4406-4.1267 7.4972-7.7304 8.7083-1.1043.346-2.2087.519-3.313.519-.4069 0-.8719 0-1.3369-.0577-6.16106-.7497-11.97341-6.5744-14.47272-14.4176-1.511217-4.8443-1.627464-9.8616-.290623-14.12923 1.394963-4.38296 4.126773-7.49716 7.730423-8.708236 1.10435-.346023 2.20872-.519034 3.31302-.519034.465 0 .93 0 1.3369.0576704z" fill="#FF5924"/>
      <path d="m11.7301 17.8631c1.0914 0 1.9762-.8778 1.9762-1.9607 0-1.083-.8848-1.9608-1.9762-1.9608s-1.97619.8778-1.97619 1.9608c0 1.0829.88479 1.9607 1.97619 1.9607z" fill="#FF5924"/>
      <path d="m21.2637 24.9569-6.2774-16.09008 9.8229 14.70598z" fill="#FF5924"/>
    </g>
  </g>
  <!-- "You're connected" — baseline at y≈39 (22 + 12 center of 24px logo + ascender offset) -->
  <text x="51" y="40" font-family="Nunito, sans-serif" font-size="18" font-weight="400" fill="#E7E9EA">You're connected</text>

  <!-- === STEPS === padding-top: 18px from header bottom (46) = 64 -->
  <!-- Step 1 -->
  <circle cx="29" cy="73" r="9" fill="#2F3336"/>
  <text x="29" y="74" font-family="Nunito, sans-serif" font-size="10" font-weight="400" fill="#71767B" text-anchor="middle">1</text>
  <text x="48" y="77" font-family="Nunito, sans-serif" font-size="13" font-weight="400" fill="#71767B">Bookmark any tweet on X</text>

  <!-- Step 2 — 18px + 8px gap = 26px below step 1 -->
  <circle cx="29" cy="99" r="9" fill="#2F3336"/>
  <text x="29" y="100" font-family="Nunito, sans-serif" font-size="10" font-weight="400" fill="#71767B" text-anchor="middle">2</text>
  <text x="48" y="103" font-family="Nunito, sans-serif" font-size="13" font-weight="400" fill="#71767B">It gets saved to your mind automatically</text>

  <!-- === FOOTER === border-top at y=132 -->
  <line x1="1" y1="133" x2="319" y2="133" stroke="#2F3336" stroke-width="1"/>

  <!-- Counter: "12 tweets saved" -->
  <text x="20" y="155" font-family="Nunito, sans-serif" font-size="13" font-weight="400" fill="#71767B">
    <tspan fill="#FF5924">12</tspan><tspan> tweets saved</tspan>
  </text>

  <!-- "Open my mind →" -->
  <text x="300" y="155" font-family="Nunito, sans-serif" font-size="13" font-weight="400" fill="#FF5924" text-anchor="end">Open my mind →</text>
</svg>