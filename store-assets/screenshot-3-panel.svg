      <path d="m11.7301 17.8631c1.0914 0 1.9762-.8778 1.9762-1.9607 0-1.083-.8848-1.9608-1.9762-1.9608s-1.97619.8778-1.97619 1.9608c0 1.0829.88479 1.9607 1.97619 1.9607z" fill="#FF5924"/>
      <path d="m21.2637 24.9569-6.2774-16.09008 9.8229 14.70598z" fill="#FF5924"/>
    </g>
    <text x="160" y="76" font-family="'Nunito', sans-serif" font-size="18" font-weight="400" fill="#E7E9EA" text-anchor="middle">Sign in to your mind</text>
    <text x="160" y="100" font-family="'Nunito', sans-serif" font-size="13" font-weight="400" fill="#71767B" text-anchor="middle">Connect your mymind account to start</text>
    <text x="160" y="118" font-family="'Nunito', sans-serif" font-size="13" font-weight="400" fill="#71767B" text-anchor="middle">saving bookmarked tweets automatically.</text>
    <rect x="112" y="134" width="96" height="34" rx="17" ry="17" fill="#FF5924"/>
    <text x="160" y="156" font-family="'Nunito', sans-serif" font-size="13" font-weight="400" fill="#FFFFFF" text-anchor="middle">Sign in</text>
  </g>

  <!-- === CONNECTED PANEL === -->
  <g transform="translate(700, 410)">
    <rect width="320" height="176" rx="12" ry="12" fill="#16181C" stroke="#2F3336" stroke-width="1"/>
    <!-- Header -->
    <g transform="translate(20, 22) scale(0.6316)">
