<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700&amp;display=swap');</style>
    <radialGradient id="glow3" cx="50%" cy="50%" r="35%"><stop offset="0%" stop-color="#FF5924" stop-opacity="0.05"/><stop offset="100%" stop-color="#FF5924" stop-opacity="0"/></radialGradient>
  </defs>

  <rect width="1280" height="800" fill="#000"/>
  <rect width="1280" height="800" fill="url(#glow3)"/>

  <!-- === LEFT SIDE TEXT === -->
  <text x="160" y="310" font-family="'Nunito', sans-serif" font-size="16" font-weight="500" fill="#FF5924" letter-spacing="1.3">ONE-CLICK SETUP</text>
  <text x="160" y="356" font-family="'Nunito', sans-serif" font-size="40" font-weight="700" fill="#E7E9EA" letter-spacing="-0.8">Sign in once.</text>
  <text x="160" y="402" font-family="'Nunito', sans-serif" font-size="40" font-weight="700" fill="#E7E9EA" letter-spacing="-0.8">Forget about it.</text>
  <text x="160" y="444" font-family="'Nunito', sans-serif" font-size="17" font-weight="400" fill="#71767B">
    <tspan x="160" dy="0">Connect your mymind account and every</tspan>
    <tspan x="160" dy="27">bookmark you make on X is automatically</tspan>
    <tspan x="160" dy="27">saved. No manual steps, ever.</tspan>
  </text>

  <!-- === SIGN-IN PANEL === -->
  <g transform="translate(700, 190)">
    <rect width="320" height="192" rx="12" ry="12" fill="#16181C" stroke="#2F3336" stroke-width="1"/>
