  <text x="160" y="302" font-family="'Nunito', sans-serif" font-size="48" font-weight="700" fill="#E7E9EA" letter-spacing="-1.2">saved to <tspan fill="#FF5924">mymind</tspan></text>
  <text x="160" y="356" font-family="'Nunito', sans-serif" font-size="48" font-weight="700" fill="#E7E9EA" letter-spacing="-1.2">automatically.</text>

  <!-- Subtext -->
  <text x="160" y="400" font-family="'Nunito', sans-serif" font-size="18" font-weight="400" fill="#71767B">
    <tspan x="160" dy="0">Bookmark any tweet and it instantly saves to your</tspan>
    <tspan x="160" dy="28">mymind library. No extra clicks. Just bookmark and go.</tspan>
  </text>

  <!-- === RIGHT: Notification === -->
