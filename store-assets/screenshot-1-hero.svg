    <text x="42" y="51" font-family="'Nunito', sans-serif" font-size="13" font-weight="600" fill="#555" text-anchor="middle">SC</text>

    <!-- Name -->
    <text x="74" y="34" font-family="'Nunito', sans-serif" font-size="16" font-weight="700" fill="#E7E9EA">Sarah Chen</text>
    <text x="178" y="34" font-family="'Nunito', sans-serif" font-size="14" font-weight="400" fill="#555">@sarahchen · 2h</text>

    <!-- Tweet body -->
    <text font-family="'Nunito', sans-serif" font-size="16" font-weight="400" fill="#D0D0D4">
      <tspan x="74" y="62">Just discovered the most incredible API</tspan>
      <tspan x="74" dy="24">for building AI agents. The developer</tspan>
      <tspan x="74" dy="24">experience is unreal — everything just</tspan>
      <tspan x="74" dy="24">works. Thread below on how I set it up</tspan>
      <tspan x="74" dy="24">in 30 minutes 🧵</tspan>
    </text>

    <!-- Actions -->
    <!-- Reply -->
    <g transform="translate(74, 206)">
      <path d="M1.751 10c.004-.996.07-1.636.301-2.16a5 5 0 0 1 2.29-2.29c.657-.305 1.47-.38 3.16-.38h8.998c1.69 0 2.502.074 3.16.38a5 5 0 0 1 2.29 2.29c.305.657.38 1.47.38 3.16v2c0 1.69-.074 2.502-.38 3.16a5 5 0 0 1-2.29 2.29c-.657.305-1.47.38-3.16.38h-5.19l-4.74 3.293a.75.75 0 0 1-1.19-.607v-2.686h-.32c-1.69 0-2.502-.074-3.16-.38a5 5 0 0 1-2.29-2.29c-.305-.657-.38-1.47-.38-3.16v-2z" stroke="#555" stroke-width="1.2" fill="none" transform="scale(0.7)"/>
    </g>
    <text x="96" y="220" font-family="'Nunito', sans-serif" font-size="13" font-weight="400" fill="#555">24</text>

    <!-- Retweet -->
    <g transform="translate(148, 206)">
      <path d="M4.5 3.88l4.432 4.14-1.364 1.46L5.5 7.55V16c0 1.1.896 2 2 2h4v2h-4c-2.21 0-4-1.79-4-4V7.55L1.432 9.48.068 8.02 4.5 3.88zM19.5 20.12l-4.432-4.14 1.364-1.46L18.5 16.45V8c0-1.1-.896-2-2-2h-4V4h4c2.21 0 4 1.79 4 4v8.45l2.068-1.93 1.364 1.46-4.432 4.14z" fill="#555" transform="scale(0.7)"/>
    </g>
    <text x="170" y="220" font-family="'Nunito', sans-serif" font-size="13" font-weight="400" fill="#555">89</text>

    <!-- Heart -->
    <g transform="translate(222, 206)">
      <path d="M16.697 5.5c-1.222-.06-2.679.51-3.89 2.16l-.807 1.1-.807-1.1C10.078 6.01 8.621 5.44 7.399 5.5c-1.174.06-2.377.68-3.17 2.14-.8 1.48-.678 3.58.585 5.96 1.2 2.26 3.274 4.57 6.186 6.9 2.912-2.33 4.986-4.64 6.186-6.9 1.263-2.38 1.385-4.48.585-5.96-.793-1.46-1.996-2.08-3.17-2.14z" stroke="#555" stroke-width="1.2" fill="none" transform="scale(0.7)"/>
    </g>
    <text x="244" y="220" font-family="'Nunito', sans-serif" font-size="13" font-weight="400" fill="#555">412</text>

    <!-- Bookmark FILLED -->
    <g transform="translate(310, 206)">
      <path d="M4 4.5C4 3.12 5.119 2 6.5 2h11C18.881 2 20 3.12 20 4.5v18.44l-8-5.71-8 5.71V4.5z" fill="#1D9BF0" transform="scale(0.7)"/>
