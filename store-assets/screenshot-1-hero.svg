  <!-- === NOTIFICATION — floating top-right, overlapping tweet card === -->
  <g transform="translate(630, 280)" filter="url(#shadow-soft)">
    <rect width="300" height="66" rx="4" ry="4" fill="#16181C" stroke="#2F3336" stroke-width="1"/>
    <!-- Progress bar -->
    <rect width="195" height="2" fill="#FF5924" rx="1"/>

    <!-- X icon — 20px padding, 24x24 icon -->
    <rect x="21" y="21" width="24" height="24" rx="6" ry="6" fill="#1A1A1A"/>
    <g transform="translate(27, 24.5) scale(0.0234)">
      <path fill="#FFFFFF" d="M403.229 0h78.506L310.219 196.04 512 462.799H354.002L230.261 301.007 88.669 462.799h-78.56l183.455-209.683L0 0h161.999l111.856 147.88L403.229 0zm-27.556 415.805h43.505L138.363 44.527h-46.68l283.99 371.278z"/>
    </g>

    <text x="59" y="38" font-family="'Nunito', sans-serif" font-size="16" font-weight="400" fill="#E7E9EA">Saved to your mind</text>
  </g>

  <!-- === HEADLINE — top, clean === -->
  <text x="640" y="140" font-family="'Nunito', sans-serif" font-size="52" font-weight="800" fill="#E7E9EA" text-anchor="middle" letter-spacing="-1.5">Bookmark on X. Find it in <tspan fill="#FF5924">mymind</tspan>.</text>
  <text x="640" y="178" font-family="'Nunito', sans-serif" font-size="17" font-weight="400" fill="#555" text-anchor="middle">Zero clicks. Fully automatic.</text>
</svg>