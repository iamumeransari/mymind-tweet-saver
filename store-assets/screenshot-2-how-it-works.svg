<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700&amp;display=swap');</style>
    <radialGradient id="glow2" cx="50%" cy="80%" r="45%"><stop offset="0%" stop-color="#FF5924" stop-opacity="0.04"/><stop offset="100%" stop-color="#FF5924" stop-opacity="0"/></radialGradient>
  </defs>

  <rect width="1280" height="800" fill="#000"/>
  <rect width="1280" height="800" fill="url(#glow2)"/>

  <!-- Section label -->
  <text x="640" y="240" font-family="'Nunito', sans-serif" font-size="16" font-weight="500" fill="#FF5924" text-anchor="middle" letter-spacing="1.3">HOW IT WORKS</text>
  <text x="640" y="290" font-family="'Nunito', sans-serif" font-size="40" font-weight="700" fill="#E7E9EA" text-anchor="middle" letter-spacing="-0.8">Three seconds. Zero clicks.</text>

  <!-- === STEP 1 === -->
  <g transform="translate(200, 370)">
    <!-- Icon circle -->
    <circle cx="60" cy="40" r="40" fill="#16181C" stroke="#2F3336" stroke-width="1"/>
    <!-- Bookmark outline icon -->
    <g transform="translate(46, 25) scale(1.15)">
      <path d="M4 4.5C4 3.12 5.119 2 6.5 2h11C18.881 2 20 3.12 20 4.5v18.44l-8-5.71-8 5.71V4.5z" stroke="#E7E9EA" stroke-width="1.5" fill="none"/>
    </g>
    <!-- Labels -->
    <text x="60" y="112" font-family="'Nunito', sans-serif" font-size="14" font-weight="500" fill="#FF5924" text-anchor="middle">Step 1</text>
    <text x="60" y="138" font-family="'Nunito', sans-serif" font-size="20" font-weight="600" fill="#E7E9EA" text-anchor="middle">Bookmark a tweet</text>
    <text x="60" y="166" font-family="'Nunito', sans-serif" font-size="14" font-weight="400" fill="#71767B" text-anchor="middle">
      <tspan x="60" dy="0">Use the bookmark button on</tspan>
      <tspan x="60" dy="21">X like you normally would.</tspan>
      <tspan x="60" dy="21">Nothing changes.</tspan>
    </text>
  </g>

  <!-- Arrow 1 -->
  <line x1="370" y1="410" x2="430" y2="410" stroke="#2F3336" stroke-width="1.5"/>
  <polygon points="428,405 438,410 428,415" fill="#2F3336"/>

  <!-- === STEP 2 === -->
  <g transform="translate(520, 370)">
    <circle cx="60" cy="40" r="40" fill="#16181C" stroke="#2F3336" stroke-width="1"/>
    <!-- Lightning icon -->
    <g transform="translate(46, 26) scale(1.15)">
      <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="#E7E9EA" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="60" y="112" font-family="'Nunito', sans-serif" font-size="14" font-weight="500" fill="#FF5924" text-anchor="middle">Step 2</text>
    <text x="60" y="138" font-family="'Nunito', sans-serif" font-size="20" font-weight="600" fill="#E7E9EA" text-anchor="middle">Auto-detected</text>
    <text x="60" y="166" font-family="'Nunito', sans-serif" font-size="14" font-weight="400" fill="#71767B" text-anchor="middle">
      <tspan x="60" dy="0">The extension detects the</tspan>
      <tspan x="60" dy="21">bookmark instantly. No buttons,</tspan>
      <tspan x="60" dy="21">no popups, no extra steps.</tspan>
    </text>
  </g>

  <!-- Arrow 2 -->
  <line x1="690" y1="410" x2="750" y2="410" stroke="#2F3336" stroke-width="1.5"/>
  <polygon points="748,405 758,410 748,415" fill="#2F3336"/>

  <!-- === STEP 3 === -->
  <g transform="translate(840, 370)">
    <circle cx="60" cy="40" r="40" fill="#16181C" stroke="#2F3336" stroke-width="1"/>
    <!-- mymind logo -->
    <g transform="translate(49, 28) scale(0.5789)">
      <path d="m13.1135979 1.54495422c-.2591574-.03664732-.5187049-.04495422-1.1419979-.04495422-.9503477 0-1.9036568.14934901-2.8351787.44088761-3.10272858 1.04273171-5.51426505 3.7677939-6.77685087 7.73477463-1.2374245 3.95026026-1.13745468 8.65465026.28840086 13.22541246 2.34062016 7.345208 7.72106031 12.7143038 13.22824111 13.3844416.3032801.0376329.5734354.0462837 1.1521876.0462837.9503675 0 1.9037092-.1493441 2.8351562-.4408528 3.1605014-1.0621537 5.5838002-3.7721399 6.7768369-7.7348603 1.2374544-3.9501538 1.1374774-8.6545278-.2883849-13.2253632-2.3317763-7.31748399-7.7009576-12.66011017-13.2384103-13.38576948zm.1949021-1.48728382c6.1611.8073856 11.9734 6.5744296 14.4727 14.4176296 1.5112 4.8443 1.6275 9.8616.2906 14.1292-1.3368 4.4406-4.1267 7.4972-7.7304 8.7083-1.1043.346-2.2087.519-3.313.519-.4069 0-.8719 0-1.3369-.0577-6.16106-.7497-11.97341-6.5744-14.47272-14.4176-1.511217-4.8443-1.627464-9.8616-.290623-14.12923 1.394963-4.38296 4.126773-7.49716 7.730423-8.708236 1.10435-.346023 2.20872-.519034 3.31302-.519034.465 0 .93 0 1.3369.0576704z" fill="#E7E9EA"/>
      <path d="m11.7301 17.8631c1.0914 0 1.9762-.8778 1.9762-1.9607 0-1.083-.8848-1.9608-1.9762-1.9608s-1.97619.8778-1.97619 1.9608c0 1.0829.88479 1.9607 1.97619 1.9607z" fill="#E7E9EA"/>
      <path d="m21.2637 24.9569-6.2774-16.09008 9.8229 14.70598z" fill="#E7E9EA"/>
    </g>
    <text x="60" y="112" font-family="'Nunito', sans-serif" font-size="14" font-weight="500" fill="#FF5924" text-anchor="middle">Step 3</text>
    <text x="60" y="138" font-family="'Nunito', sans-serif" font-size="20" font-weight="600" fill="#E7E9EA" text-anchor="middle">Saved to mymind</text>
    <text x="60" y="166" font-family="'Nunito', sans-serif" font-size="14" font-weight="400" fill="#71767B" text-anchor="middle">
      <tspan x="60" dy="0">The tweet URL is saved directly</tspan>
      <tspan x="60" dy="21">to your mymind library.</tspan>
      <tspan x="60" dy="21">Find it anytime.</tspan>
    </text>
  </g>
</svg>